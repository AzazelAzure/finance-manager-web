# Single-page app: Vite `index.html` + client-side routing
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    # Avoid stale index after deploys
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}

# Single-page app: Vite `index.html` + client-side routing
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Browsers request /favicon.ico even when HTML only links /favicon.svg — avoid noisy 404.
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    # Belt-and-suspenders if any client still loads scripts as CORS (e.g. crossorigin left on).
    location /assets/ {
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
    # Avoid stale index after deploys
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
